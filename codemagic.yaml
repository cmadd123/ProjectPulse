workflows:
  ios-workflow:
    name: iOS Production Build
    max_build_duration: 60
    instance_type: mac_mini_m1

    integrations:
      app_store_connect: CodeMagic Key

    environment:
      flutter: 3.41.1
      xcode: latest
      cocoapods: default
      groups:
        - APP_STORE_KEYS
      vars:
        BUNDLE_ID: "com.consciousapps.projectpulse"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Create GoogleService-Info.plist from environment variable
        script: |
          echo "$GOOGLE_SERVICE_INFO_PLIST" > ios/Runner/GoogleService-Info.plist

      - name: Set up code signing
        script: |
          set -e
          echo "=== Initializing keychain ==="
          keychain initialize

          echo "=== Fetching signing files for: $BUNDLE_ID ==="
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key=@env:CERTIFICATE_PRIVATE_KEY

          echo "=== Adding certificates to keychain ==="
          keychain add-certificates

          echo "=== Applying profiles to Xcode project ==="
          xcode-project use-profiles

          echo "=== Code signing setup complete ==="

      - name: Get Flutter packages
        script: flutter pub get

      - name: Install CocoaPods dependencies
        script: |
          cd ios && pod install

      - name: Flutter analyze
        script: flutter analyze --no-fatal-infos
        ignore_failure: true

      - name: Build iOS IPA with timestamp build number
        script: |
          # Unix timestamp as build number — always unique, always increasing,
          # never collides with a previous TestFlight upload.
          BUILD_NUMBER=$(date +%s)
          echo "=== BUILD NUMBER (Unix timestamp): $BUILD_NUMBER ==="

          flutter build ipa --release \
            --build-number=$BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      email:
        recipients:
          - collinjmaddox@gmail.com
        notify:
          success: true
          failure: true

      app_store_connect:
        auth: integration
        submit_to_testflight: true
